name: Repo Pipeline

on:
  schedule:
    - cron: "15 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout mktme-data
        uses: actions/checkout@v4
        with:
          repository: Marshdoggo/mktme-data
          path: mktme_data
          token: ${{ secrets.PUBLISHER_PAT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish legacy artifacts from the main repo
        env:
          MKTME_PIPELINE_TRIGGER: schedule
          MKTME_DATA_REPO: ${{ github.workspace }}/mktme_data
          MKTME_GITHUB_USER: marshdoggo
          MKTME_FORCE_REFRESH: "1"
        run: |
          python -m pipeline.publish_legacy_artifacts --universes sp500

      - name: Commit and push mktme-data
        run: |
          cd mktme_data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A sp500/prices.parquet manifest.json reports/
          if git diff --cached --quiet; then
            echo "No mktme-data changes to commit."
          else
            git commit -m "chore: publish legacy artifacts"
            git push https://marshdoggo:${{ secrets.PUBLISHER_PAT }}@github.com/Marshdoggo/mktme-data.git HEAD:main
          fi

      - name: Commit pipeline status artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runtime/market_metrics.db data/runtime/pipeline_status.json
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "chore: update pipeline status"
            git push
          fi
