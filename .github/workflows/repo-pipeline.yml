name: Repo Pipeline

on:
  schedule:
    - cron: "15 2 * * 1-5"
  workflow_dispatch:
    inputs:
      universes:
        description: "Space-separated universes to publish"
        required: true
        default: "nasdaq100 dow30 fx"
      equity_source_default:
        description: "Default source for universes without an override (auto, stooq, yahoo, twelvedata, alphavantage)"
        required: false
        default: "auto"
      source_sp500:
        description: "Optional source override for sp500"
        required: false
        default: "twelvedata"
      source_nasdaq100:
        description: "Optional source override for nasdaq100"
        required: false
        default: "stooq"
      source_dow30:
        description: "Optional source override for dow30"
        required: false
        default: "stooq"
      source_fx:
        description: "Optional source override for fx"
        required: false
        default: "auto"
      use_existing_parquet:
        description: "Reuse checked-out mktme-data parquet files instead of live refresh"
        required: false
        default: "false"

concurrency:
  group: repo-pipeline-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout mktme-data
        uses: actions/checkout@v4
        with:
          repository: Marshdoggo/mktme-data
          path: mktme_data
          persist-credentials: false

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish legacy artifacts from the main repo
        env:
          MKTME_PIPELINE_TRIGGER: ${{ github.event_name }}
          MKTME_DATA_REPO: ${{ github.workspace }}/mktme_data
          MKTME_GITHUB_USER: marshdoggo
          MKTME_FORCE_REFRESH: "1"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_DAILY_LIMIT: ${{ vars.TWELVEDATA_DAILY_LIMIT || '800' }}
          TWELVEDATA_PER_MINUTE: ${{ vars.TWELVEDATA_PER_MINUTE || '8' }}
          TWELVEDATA_OUTPUTSIZE: ${{ vars.TWELVEDATA_OUTPUTSIZE || '3000' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export MKTME_EQUITY_SOURCE="${{ inputs.equity_source_default }}"
            export MKTME_SOURCE_SP500="${{ inputs.source_sp500 }}"
            export MKTME_SOURCE_NASDAQ100="${{ inputs.source_nasdaq100 }}"
            export MKTME_SOURCE_DOW30="${{ inputs.source_dow30 }}"
            export MKTME_SOURCE_FX="${{ inputs.source_fx }}"
            UNIVERSES="${{ inputs.universes }}"
            USE_EXISTING_PARQUET="${{ inputs.use_existing_parquet }}"
          else
            export MKTME_EQUITY_SOURCE="auto"
            export MKTME_SOURCE_SP500="twelvedata"
            export MKTME_SOURCE_NASDAQ100="stooq"
            export MKTME_SOURCE_DOW30="stooq"
            export MKTME_SOURCE_FX="auto"
            UNIVERSES="nasdaq100 dow30 fx"
            USE_EXISTING_PARQUET="false"
          fi
          EXTRA_ARGS=""
          if [ "${USE_EXISTING_PARQUET}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --use-existing-parquet"
          fi
          python -m pipeline.publish_legacy_artifacts --universes ${UNIVERSES} ${EXTRA_ARGS}

      - name: Commit and push mktme-data
        env:
          PUBLISHER_PAT: ${{ secrets.PUBLISHER_PAT }}
        run: |
          cd mktme_data
          if [ -z "$PUBLISHER_PAT" ]; then
            echo "PUBLISHER_PAT is missing."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A sp500/ nasdaq100/ dow30/ fx/ manifest.json reports/
          if git diff --cached --quiet; then
            echo "No mktme-data changes to commit."
          else
            git commit -m "chore: publish legacy artifacts"
            git remote set-url origin "https://x-access-token:${PUBLISHER_PAT}@github.com/Marshdoggo/mktme-data.git"
            git push origin HEAD:main
          fi

      - name: Commit pipeline status artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runtime/market_metrics.db data/runtime/pipeline_status.json
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "chore: update pipeline status"
            if ! git pull --rebase origin main; then
              echo "Status rebase failed after publish; leaving workflow green because artifacts already published."
              git rebase --abort || true
              exit 0
            fi
            if ! git push origin HEAD:main; then
              echo "Status push lost a race to a newer main commit; skipping status push for this run."
              exit 0
            fi
          fi
